  <style>
    /* ── Design tokens ─────────────────────────────────────────── */
    :root {
      --bg:           #fafaf9;
      --bg-surface:   #f2ece6;
      --text:         #1c1917;
      --text-muted:   #78716c;
      --accent:       #b5534a;
      --accent-dark:  #8f3f38;
      --rule:         #e2d9d2;
      --nav-bg:       rgba(250, 250, 249, 0.92);
      --max-w:        780px;

      --ff-serif: "Playfair Display", Georgia, serif;
      --ff-sans:  "Inter", system-ui, sans-serif;
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-sans);
      font-weight: 400;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navigation ─────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
    }

    nav .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }

    nav .nav-name {
      font-family: var(--ff-serif);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.01em;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav ul a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav ul a:hover { color: var(--accent); }
    nav ul a.active { color: var(--accent); }

    /* ── Layout ─────────────────────────────────────────────────── */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
    }

    section {
      padding-top: 4rem;
      border-top: 1px solid var(--rule);
      margin-top: 4rem;
    }

    section:first-of-type { border-top: none; margin-top: 0; }

    /* ── Typography ─────────────────────────────────────────────── */
    h1 {
      font-family: var(--ff-serif);
      font-size: clamp(2.4rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    h2 {
      font-family: var(--ff-serif);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.75rem;
      color: var(--text);
    }

    h3 {
      font-family: var(--ff-sans);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    p { color: var(--text); }

    /* ── Hero ───────────────────────────────────────────────────── */
    .hero {
      padding: 4.5rem 0 3.5rem;
      border-top: none;
      margin-top: 0;
    }

    .hero-inner {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 2.5rem;
    }

    .hero-text { flex: 1 1 0; min-width: 0; }

    .hero-photo {
      flex: 0 0 auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--rule);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-top: 0.25rem;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 520px) {
      .hero-inner { flex-direction: column-reverse; align-items: center; }
      .hero-photo { width: 110px; height: 110px; }
    }

    .hero-creds {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--bg-surface);
      border: 1px solid var(--rule);
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
    }

    .hero-tagline {

      padding: 2rem 1.5rem 3rem;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    footer p {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    footer a {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--accent); }

    /* ── Mobile nav ─────────────────────────────────────────────── */
    @media (max-width: 640px) {
      nav ul { display: none; }
    }

    /* ── Print styles ───────────────────────────────────────────── */
    @media print {
      nav, footer { display: none; }
      main { padding: 0 2rem; }
      section { page-break-inside: avoid; }
      details { display: block; }
      details summary { display: none; }
      .skill-tags { padding: 0; background: none; border: none; }
      .btn { display: none; }
      :root {
        --bg: #fff;
        --bg-surface: #f5f5f4;
        --text: #000;
        --accent: #8f3f38;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation - populated by JS from CV config above -->
  <nav id="nav">
    <div class="nav-inner">
      <a class="nav-name" href="#hero" id="nav-name"></a>
      <ul>
        <li><a href="#summary">Summary</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#experience">Experience</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#speaking">Talks</a></li>
        <li><a href="#education">Education</a></li>
        <li><a href="#beyond">Beyond</a></li>
      </ul>
    </div>
  </nav>

  <main>

    <!-- Hero -->
    <section class="hero" id="hero">
      <div class="hero-inner">
        <div class="hero-text">
          <div class="hero-creds">
            <span class="badge" id="hero-creds"></span>
          </div>
          <h1 id="hero-name"></h1>
          <p class="hero-tagline" id="hero-tagline"></p>
          <div class="hero-links" id="hero-links"></div>
        </div>
        <div class="hero-photo">
          <img src="Headshot.png" alt="Bogdan Nenchev" />
        </div>
      </div>
    </section>

    <!-- Professional Summary -->
    <section id="summary">
      <h2>Professional Summary</h2>
      <div id="summary-text"></div>
    </section>

    <!-- Technical Skills -->
    <section id="skills">
      <h2>Technical Skills</h2>
      <div class="skills-grid" id="skills-grid"></div>
    </section>

    <!-- Professional Experience -->
    <section id="experience">
      <h2>Professional Experience</h2>
      <div class="exp-list" id="exp-list"></div>
    </section>

    <!-- Key Projects -->
    <section id="projects">
      <h2>Key Projects</h2>
      <div class="projects-grid" id="projects-grid"></div>
    </section>

    <!-- Speaking Engagements & Awards -->
    <section id="speaking">
      <h2>Speaking Engagements &amp; Awards</h2>
      <div class="two-col">
        <div>
          <p class="subsection-title">Talks &amp; Panels</p>
          <div class="event-list" id="speaking-list"></div>
        </div>
        <div>
          <p class="subsection-title">Awards &amp; Certifications</p>
          <div class="event-list" id="awards-list"></div>
        </div>
      </div>
    </section>

    <!-- Education -->
    <section id="education">
      <h2>Education</h2>
      <div class="edu-list" id="edu-list"></div>
    </section>

    <!-- Beyond Work -->
    <section id="beyond">
      <h2>Beyond Work</h2>
      <div class="beyond-grid" id="beyond-grid"></div>
    </section>

  </main>

  <footer>
    <p id="footer-copy"></p>
    <div style="display:flex;gap:1.25rem;">
      <a id="footer-linkedin" href="#">LinkedIn</a>
      <a href="#hero">↑ Top</a>
    </div>
  </footer>

  <!-- Render from CV config -->
  <script>
    function esc(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    // Wrap metrics in bullet/desc text with a highlight span
    function highlight(str) {
      return esc(str).replace(
        /(£[\d,]+(?:\s*million|\s*billion)?|[\d,]+(?:\.[\d]+)?[x%]|\d+\+)/gi,
        "<span class='stat'>$1</span>"
      );
    }

    // Nav name
    document.getElementById("nav-name").textContent =
      CV.name ;

    // Hero
    document.getElementById("hero-creds").textContent = CV.credentials;
    document.getElementById("hero-name").textContent = CV.name;
    document.getElementById("hero-tagline").textContent = CV.tagline;

    const linksEl = document.getElementById("hero-links");
    if (CV.linkedin) {
      const a = document.createElement("a");
      a.href = CV.linkedin;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "btn btn-primary";
      a.textContent = "LinkedIn Profile";
      linksEl.appendChild(a);
    }
    if (CV.email) {
      const a = document.createElement("a");
      a.href = "mailto:" + CV.email;
      a.className = "btn btn-outline";
      a.textContent = "Email";
      linksEl.appendChild(a);
    }
    if (CV.github) {
      const a = document.createElement("a");
      a.href = CV.github;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "btn btn-outline";
      a.textContent = "GitHub";
      linksEl.appendChild(a);
    }
    if (CV.scholar) {
      const a = document.createElement("a");
      a.href = CV.scholar;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "btn btn-outline";
      a.textContent = "Google Scholar";
      linksEl.appendChild(a);
    }
    if (CV.researchgate) {
      const a = document.createElement("a");
      a.href = CV.researchgate;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "btn btn-outline";
      a.textContent = "ResearchGate";
      linksEl.appendChild(a);
    }

    // Summary
    const summaryEl = document.getElementById("summary-text");
    const summaryParas = Array.isArray(CV.summary) ? CV.summary : [CV.summary];
    summaryParas.forEach(para => {
      const p = document.createElement("p");
      p.className = "summary-text";
      p.textContent = para;
      summaryEl.appendChild(p);
    });

    // Skills
    const skillsGrid = document.getElementById("skills-grid");
    CV.skills.forEach(group => {
      const details = document.createElement("details");
      details.className = "skill-group";

      const summary = document.createElement("summary");
      summary.className = "skill-summary";
      summary.innerHTML =
        "<span>" + esc(group.group) + "</span>" +
        "<span class='summary-arrow'>&#9654;</span>";

      const tagsDiv = document.createElement("div");
      tagsDiv.className = "skill-tags";
      group.items.forEach(item => {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = item;
        tagsDiv.appendChild(span);
      });

      details.appendChild(summary);
      details.appendChild(tagsDiv);
      skillsGrid.appendChild(details);
    });

    // Experience
    const expList = document.getElementById("exp-list");
    CV.experience.forEach(role => {
      const div = document.createElement("div");
      div.className = "exp-item";
      div.innerHTML =
        "<div class='exp-header'>" +
          "<h3 class='exp-title'>" + esc(role.title) + "</h3>" +
          "<span class='exp-period'>" + esc(role.period) + "</span>" +
        "</div>" +
        "<p class='exp-org'>" + esc(role.org) + " &middot; " + esc(role.location) + "</p>" +
        "<ul class='exp-bullets'>" +
          role.bullets.map(b => "<li>" + highlight(b) + "</li>").join("") +
        "</ul>";
      expList.appendChild(div);
    });

    // Projects
    const projectsGrid = document.getElementById("projects-grid");
    CV.projects.forEach(p => {
      const div = document.createElement("div");
      div.className = "project-card";
      div.innerHTML =
        "<p class='project-name'>" + esc(p.name) + "</p>" +
        "<div class='project-tags'>" +
          p.tags.map(t => "<span class='tag'>" + esc(t) + "</span>").join("") +
        "</div>" +
        "<p class='project-desc'>" + highlight(p.desc) + "</p>" +
        (p.link ? "<a class='project-link' href='" + esc(p.link) + "' target='_blank' rel='noopener noreferrer'>&#8599; View project</a>" : "");
      projectsGrid.appendChild(div);
    });

    // Speaking
    const speakingList = document.getElementById("speaking-list");
    function makeSpeakingItem(s) {
      const div = document.createElement("div");
      div.className = "event-item";
      div.innerHTML =
        "<p class='event-year'>" + esc(s.year) + "</p>" +
        "<p class='event-name'>" + esc(s.event) + "</p>" +
        "<p class='event-venue'>" + esc(s.venue) + "</p>";
      return div;
    }
    CV.speaking.slice(0, 3).forEach(s => speakingList.appendChild(makeSpeakingItem(s)));
    if (CV.speaking.length > 3) {
      const details = document.createElement("details");
      details.style.cssText = "margin-top:1rem;";
      const summary = document.createElement("summary");
      summary.style.cssText = "font-size:0.78rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent);cursor:pointer;list-style:none;user-select:none;";
      summary.textContent = "+" + (CV.speaking.length - 3) + " more";
      details.appendChild(summary);
      const inner = document.createElement("div");
      inner.style.cssText = "display:flex;flex-direction:column;gap:1rem;margin-top:1rem;";
      CV.speaking.slice(3).forEach(s => inner.appendChild(makeSpeakingItem(s)));
      details.appendChild(inner);
      speakingList.appendChild(details);
    }

    // Awards
    const awardsList = document.getElementById("awards-list");
    CV.awards.forEach(a => {
      const div = document.createElement("div");
      div.className = "event-item";
      div.innerHTML =
        "<p class='event-year'>" + esc(a.year) + "</p>" +
        "<p class='event-name'>" + esc(a.award) + "</p>" +
        "<p class='event-venue'>" + esc(a.body) + "</p>";
      awardsList.appendChild(div);
    });

    // Education
    const eduList = document.getElementById("edu-list");
    CV.education.forEach(e => {
      const div = document.createElement("div");
      div.className = "edu-item";
      const bullets = e.bullets.length
        ? "<ul class='exp-bullets'>" +
            e.bullets.map(b => "<li>" + esc(b) + "</li>").join("") +
          "</ul>"
        : "";
      div.innerHTML =
        "<div class='edu-header'>" +
          "<h3 class='edu-degree'>" + esc(e.degree) + "</h3>" +
          "<span class='edu-period'>" + esc(e.period) + "</span>" +
        "</div>" +
        "<p class='edu-school'>" + esc(e.school) + "</p>" +
        bullets;
      eduList.appendChild(div);
    });

    // Beyond Work
    const beyondGrid = document.getElementById("beyond-grid");
    CV.beyond.forEach(item => {
      const div = document.createElement("div");
      div.className = "beyond-card";
      div.innerHTML =
        "<p class='beyond-title'>" + esc(item.title) + "</p>" +
        "<p class='beyond-desc'>" + esc(item.desc) + "</p>";
      beyondGrid.appendChild(div);
    });

    // Footer
    const year = new Date().getFullYear();
    document.getElementById("footer-copy").textContent =
      "© " + year + " " + CV.name + ". All rights reserved.";
    if (CV.linkedin) {
      document.getElementById("footer-linkedin").href = CV.linkedin;
    }
    const footerLinks = document.querySelector("footer div");
    if (CV.scholar) {
      const a = document.createElement("a");
      a.href = CV.scholar;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.textContent = "Scholar";
      footerLinks.insertBefore(a, footerLinks.lastElementChild);
    }
    if (CV.researchgate) {
      const a = document.createElement("a");
      a.href = CV.researchgate;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.textContent = "ResearchGate";
      footerLinks.insertBefore(a, footerLinks.lastElementChild);
    }

    // Scroll-spy: highlight the nav link for the section currently in view
    (function () {
      const navLinks = Array.from(document.querySelectorAll("nav ul a"));
      const sectionIds = navLinks.map(a => a.getAttribute("href").slice(1));
      const sections = sectionIds.map(id => document.getElementById(id)).filter(Boolean);

      function setActive(id) {
        navLinks.forEach(a => {
          a.classList.toggle("active", a.getAttribute("href") === "#" + id);
        });
      }

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) setActive(entry.target.id);
        });
      }, {
        rootMargin: "-52px 0px -60% 0px",
        threshold: 0
      });

      sections.forEach(s => observer.observe(s));
    })();
  </script>

</body>
</html>
